<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>Flama Workshop</title>
<style>
:root{
  --logo-filter: none;
}
@media(prefers-color-scheme:dark){
  :root{ --logo-filter: invert(1) brightness(2); }
}
:root{
  --bg:#f5f4f0;--bg-card:#fff;--bg-subtle:#f0efeb;--bg-input:#fff;
  --text:#1a1a1a;--text2:#888;--text3:#bbb;
  --border:#e5e4e0;--border-row:#f0efeb;--border-input:#ddd;
  --modal:#fff;--toggle:#fff;
  --torno-bg:#dce8fa;--modelado-bg:#f0e0fa;
  --undo-bg:#1a1a1a;--undo-text:#fff;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#111110;--bg-card:#1c1c1a;--bg-subtle:#2a2a28;--bg-input:#242422;
  --text:#f0ede8;--text2:#b0aca6;--text3:#666;
  --border:#3a3a38;--border-row:#2a2a28;--border-input:#44443f;
  --modal:#1c1c1a;--toggle:#2a2a28;
  --torno-bg:rgba(100,160,255,0.12);--modelado-bg:rgba(200,130,255,0.12);
  --undo-bg:#f0ede8;--undo-text:#1a1a1a;
}}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:16px;}
.app{max-width:480px;margin:0 auto;padding:0 0 70px;}
.header{background:var(--bg-card);border-bottom:1px solid var(--border);padding:12px 16px;position:sticky;top:0;z-index:10;}
#sticky-add-bar{padding:8px 0 0;}
#flama-logo{filter:var(--logo-filter);}
.header-title{font-size:17px;font-weight:600;margin-bottom:10px;color:var(--text);}
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--bg-card);border-top:1px solid var(--border);display:flex;z-index:50;padding-bottom:env(safe-area-inset-bottom,0);}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 4px 6px;background:none;border:none;cursor:pointer;color:var(--text2);gap:2px;position:relative;}
.bnav-btn svg{width:22px;height:22px;flex-shrink:0;}
.bnav-btn span{font-size:10px;font-weight:500;}
.bnav-btn.active{color:var(--text);}
.bnav-btn.active svg{stroke-width:2.4;}
.notif{position:absolute;top:4px;right:calc(50% - 18px);font-size:9px;background:#d63b3b;color:#fff;border-radius:10px;padding:1px 5px;font-weight:700;min-width:16px;text-align:center;}
.content{padding:16px;}
.slabel{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;padding-left:2px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;}
.sticky-add{position:sticky;top:56px;z-index:8;background:var(--bg);padding:8px 0 4px;}
.day-label{font-size:13px;font-weight:700;color:#fff;text-align:center;margin:20px 0 10px;letter-spacing:0.04em;text-transform:uppercase;background:#1a1a1a;border-radius:20px;padding:5px 16px;display:inline-block;width:100%;}
@media(prefers-color-scheme:dark){.sticky-add{position:sticky;top:56px;z-index:8;background:var(--bg);padding:8px 0 4px;}
.day-label{background:#f0ede8;color:#111110;}}
.sblock{margin-bottom:20px;}
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px;}
.cap-row{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;}
.cap-chip{font-size:12px;padding:3px 10px;border-radius:20px;background:var(--bg-subtle);font-weight:600;display:inline-flex;align-items:center;gap:4px;}
.cap-block{flex:1;background:var(--bg-subtle);border-radius:10px;padding:8px 10px;}
.cap-lbl{font-size:11px;color:var(--text2);margin-bottom:2px;}
.cap-val{font-size:15px;font-weight:600;}
.c-ok{color:#1D9E75;}.c-warn{color:#c07800;}.c-full{color:#d63b3b;}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:4px;}
.chip{font-size:13px;border-radius:20px;padding:5px 12px;cursor:pointer;border:1px solid transparent;display:flex;align-items:center;gap:4px;}
.ch-active{background:var(--bg-subtle);border-color:var(--border);color:var(--text);}
.ch-pausa{background:transparent;border:1px dashed var(--text3);color:var(--text3);font-style:italic;}
.ch-pause-sched{background:transparent;border:1px dashed #c07800;color:#c07800;font-style:italic;}
.ch-baja{background:#ffeaea;color:#b03030;border-color:#f5b8b8;text-decoration:line-through;}
.ch-cambio{background:#e8f0fe;color:#1a5ca8;border-color:#b3c8f5;text-decoration:line-through;}
.ch-visit{background:#e1f5ee;color:#0a6e50;border-color:#9FE1CB;}
.ch-rec{background:#e8f0fe;color:#1a5ca8;border-color:#b3c8f5;}
.ch-gift{background:#fce4ec;color:#ad1457;border-color:#f48fb1;}
.ch-flam{background:#f0e6d3;color:#6b4c1e;border-color:#c8a87a;}
.ch-pending{background:#e1f5ee;color:#0a6e50;border-color:#9FE1CB;font-style:italic;}
.ch-add{background:none;border:1px dashed var(--text3);color:var(--text2);font-size:13px;}
.rec-badge{font-size:10px;background:#ffeaea;color:#b03030;border-radius:10px;padding:1px 5px;font-weight:700;}
.srow{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--border-row);cursor:pointer;}
.srow:last-of-type{border-bottom:none;}
.sname{font-size:15px;font-weight:500;display:flex;align-items:center;gap:6px;flex-wrap:wrap;color:var(--text);}
.shandle{font-size:12px;color:var(--text2);font-family:monospace;margin-top:1px;}
.smeta{font-size:12px;color:var(--text2);margin-top:3px;line-height:1.5;}
.sdot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.dot-active{background:#1D9E75;}.dot-pausa{background:#c07800;}.dot-baja{background:#d63b3b;}.dot-gift{background:#7a1a9a;}.dot-flam{background:#6b4c1e;}
.splus{width:18px;height:18px;border-radius:50%;background:#1D9E75;color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0;line-height:1;}
.add-form{background:var(--bg-subtle);border-radius:12px;padding:14px;margin-bottom:12px;}
.flbl{font-size:12px;color:var(--text2);margin-bottom:5px;margin-top:12px;display:block;}
.flbl:first-of-type{margin-top:0;}
.ipfx{display:flex;align-items:center;background:var(--bg-input);border:1px solid var(--border-input);border-radius:10px;overflow:hidden;}
.ipfx span{padding:0 4px 0 12px;font-size:15px;color:var(--text2);font-family:monospace;}
.ipfx input{border:none;padding:10px 12px 10px 0;font-size:15px;color:var(--text);background:none;width:100%;outline:none;}
input[type=text],input[type=number],input[type=date],select,textarea{width:100%;font-size:15px;padding:10px 12px;border-radius:10px;border:1px solid var(--border-input);background:var(--bg-input);color:var(--text);-webkit-appearance:none;}
textarea{resize:none;height:70px;}
.trow{display:flex;gap:6px;flex-wrap:wrap;}
.tbtn{font-size:13px;padding:6px 14px;border-radius:20px;border:1px solid var(--border-input);background:var(--toggle);cursor:pointer;color:var(--text2);}
.tbtn.sel{background:var(--text);color:var(--bg);border-color:var(--text);}
.btn-row{display:flex;gap:8px;justify-content:flex-end;margin-top:12px;}
.msheet .btn-row{position:sticky;bottom:0;background:var(--modal);padding:12px 0 20px;margin-top:auto;z-index:1;}
.btn{font-size:14px;padding:9px 18px;border-radius:10px;border:1px solid var(--border-input);background:var(--bg-card);cursor:pointer;color:var(--text);}
.btn-p{background:var(--text);color:var(--bg);border-color:var(--text);}
.btn-danger{background:#b03030;color:#fff;border-color:#b03030;}
.btn-purple{background:#7a1a9a;color:#fff;border-color:#7a1a9a;}
.btn-green{background:#0a6e50;color:#fff;border-color:#0a6e50;}
.btn-block{width:100%;padding:12px;text-align:center;}
.moverlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);display:flex;align-items:flex-end;justify-content:center;z-index:100;}
.msheet{background:var(--modal);border-radius:20px 20px 0 0;padding:20px 20px 0 20px;width:100%;max-width:480px;max-height:88vh;overflow-y:auto;display:flex;flex-direction:column;}
.mhandle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px;}
.mname{font-size:20px;font-weight:700;margin-bottom:2px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;color:var(--text);}
.mhandle2{font-size:13px;color:var(--text2);font-family:monospace;margin-bottom:3px;}
.msub{font-size:13px;color:var(--text2);margin-bottom:16px;}
.arow{display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid var(--border-row);cursor:pointer;}
.arow:last-child{border-bottom:none;}
.aico{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
.atxt{font-size:15px;color:var(--text);}
.asub{font-size:12px;color:var(--text2);}
.adanger .atxt{color:#b03030;}
.hitem{padding:10px 0;border-bottom:1px solid var(--border-row);display:flex;gap:10px;}
.hitem:last-child{border-bottom:none;}
.hdot{width:8px;height:8px;border-radius:50%;margin-top:5px;flex-shrink:0;}
.hdate{font-size:12px;color:var(--text2);margin-bottom:2px;}
.htxt{font-size:14px;color:var(--text);}
.pcrd{background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;}
.pname{font-size:14px;font-weight:600;display:flex;align-items:center;gap:5px;color:var(--text);}
.phandl{font-size:11px;color:var(--text2);font-family:monospace;}
.pdet{font-size:12px;color:var(--text2);margin-top:2px;}
.pstat{font-size:12px;padding:4px 12px;border-radius:20px;white-space:nowrap;font-weight:500;flex-shrink:0;}
.ps-ok{background:#e1f5ee;color:#0a6e50;}.ps-pend{background:#ffeaea;color:#b03030;}.ps-part{background:#fff3e0;color:#8a5a00;}
.mnav,.wnav{display:flex;align-items:center;gap:10px;margin-bottom:0;padding:8px 0 0;}
.mnav-btn{background:var(--bg-card);border:1px solid var(--border-input);border-radius:10px;padding:6px 14px;font-size:15px;cursor:pointer;color:var(--text);}
.mnav button,.wnav button{background:var(--bg-card);border:1px solid var(--border-input);border-radius:10px;padding:6px 14px;font-size:15px;cursor:pointer;color:var(--text);}
.mlbl,.wlbl{font-size:14px;font-weight:600;flex:1;text-align:center;color:var(--text);}
.sumrow{display:flex;gap:8px;margin-bottom:16px;}
.sumblk{flex:1;background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:12px;text-align:center;}
.sumval{font-size:22px;font-weight:700;color:var(--text);}
.sumlbl{font-size:11px;color:var(--text2);margin-top:2px;}
.rlist{background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px;}
.rtitle{font-size:13px;font-weight:600;margin-bottom:10px;color:var(--text);}
.ritem{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border-row);}
.ritem:last-child{border-bottom:none;}
.brec{font-size:12px;padding:4px 12px;border-radius:20px;border:1px solid var(--border-input);background:var(--bg-card);cursor:pointer;color:var(--text2);}
.canjear-btn{font-size:12px;padding:4px 10px;border-radius:20px;border:1px solid #1a5ca8;background:#e8f0fe;cursor:pointer;color:#1a5ca8;font-weight:500;}
.notif{font-size:10px;background:#ffeaea;color:#b03030;border-radius:10px;padding:1px 6px;margin-left:3px;font-weight:700;}
.empty{font-size:14px;color:var(--text3);text-align:center;padding:40px 0;}
.tag{font-size:11px;padding:2px 8px;border-radius:10px;font-weight:500;}
.tag-t{background:#e8f0fe;color:#1a5ca8;}.tag-m{background:#f3e8fd;color:#7a1a9a;}.tag-g{background:#f3e8fd;color:#7a1a9a;}.tag-p{background:#e1f5ee;color:#0a6e50;}
.err{font-size:12px;color:#b03030;margin-top:4px;}
.spot-tag{font-size:11px;padding:2px 8px;border-radius:10px;font-weight:500;}
.s-ok{background:#e1f5ee;color:#0a6e50;}.s-warn{background:#fff3e0;color:#8a5a00;}.s-full{background:#ffeaea;color:#b03030;}
.csheet{background:var(--modal);border-radius:20px 20px 0 0;padding:24px 20px 28px;width:100%;max-width:480px;}
.ctitle{font-size:17px;font-weight:700;margin-bottom:8px;color:var(--text);}
.cbody{font-size:14px;color:var(--text2);margin-bottom:20px;line-height:1.5;}
.cbtns{display:flex;flex-direction:column;gap:8px;}
.ubar{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--undo-bg);color:var(--undo-text);padding:12px 20px;border-radius:14px;display:flex;align-items:center;gap:16px;font-size:14px;z-index:200;box-shadow:0 4px 20px rgba(0,0,0,.2);white-space:nowrap;}
.ubtn{font-size:14px;font-weight:600;color:#7dd4b8;background:none;border:none;cursor:pointer;}
.tsec{border-radius:10px;padding:8px 10px;margin-bottom:8px;}
.paid-badge{font-size:9px;color:#1D9E75;font-weight:700;margin-left:2px;}
.unpaid-badge{font-size:9px;color:#c07800;font-weight:700;margin-left:2px;}
.tsec-torno{background:var(--torno-bg);}
.tsec-modelado{background:var(--modelado-bg);}
.trlbl{font-size:10px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;margin-bottom:5px;display:flex;align-items:center;gap:4px;}
.abar{padding:8px 12px;border-radius:10px;font-size:12px;margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.aw{background:#fff3e0;border:1px solid #ffd28a;color:#8a5a00;}
.ag{background:#e1f5ee;border:1px solid #9FE1CB;color:#0a6e50;}
.csi{border:1.5px solid var(--border);border-radius:12px;padding:12px;margin-bottom:8px;cursor:pointer;}
.csi.sel{border-color:var(--text);}
.gact{display:flex;gap:8px;margin-top:8px;}
.gbtn{flex:1;font-size:12px;padding:7px 8px;border-radius:10px;border:none;cursor:pointer;font-weight:500;text-align:center;}
.sug{font-size:11px;color:#4a8fdb;cursor:pointer;margin-top:4px;text-decoration:underline;}
.slist{background:var(--bg-card);border:1px solid var(--border-input);border-radius:10px;max-height:200px;overflow-y:auto;margin-top:4px;}
.slist-item{padding:10px 12px;cursor:pointer;font-size:14px;border-bottom:1px solid var(--border-row);display:flex;align-items:center;gap:8px;}
.slist-item:last-child{border-bottom:none;}
.slist-item.sel{background:var(--bg-subtle);}
.sli-name{font-weight:500;color:var(--text);}
.sli-meta{font-size:12px;color:var(--text2);}
.tipo-wrap{border-radius:10px;padding:8px 10px;margin-bottom:8px;}
/* Dark mode semantic color overrides */
@media(prefers-color-scheme:dark){
  /* Chips */
  .ch-active{background:#2a2a28;border-color:#44443f;color:#f0ede8;}
  .ch-baja{background:#3d1515;color:#ff8080;border-color:#7a3030;text-decoration:line-through;}
  .ch-cambio{background:#0f2040;color:#7ab8ff;border-color:#1a4080;text-decoration:line-through;}
  .ch-visit{background:#0f3020;color:#5de0a0;border-color:#1a6040;}
  .ch-rec{background:#0f2040;color:#7ab8ff;border-color:#1a4080;}
  .ch-gift{background:#3d1030;color:#ff80c0;border-color:#7a2060;}
  .ch-flam{background:#2a1e0f;color:#e0b87a;border-color:#6b4c1e;}
  .ch-pending{background:#0f3020;color:#5de0a0;border-color:#1a6040;font-style:italic;}
  .ch-pausa{border-color:#666;color:#888;}
  .ch-pause-sched{border-color:#c07800;color:#ffa020;}
  /* Tags */
  .tag-t{background:#0f2040;color:#7ab8ff;}
  .tag-m{background:#2a1040;color:#c880ff;}
  .tag-g{background:#2a1040;color:#c880ff;}
  .tag-p{background:#0f3020;color:#5de0a0;}
  /* Alerts */
  .aw{background:#2a1a00;border-color:#7a5000;color:#ffc060;}
  .ag{background:#0a2010;border-color:#1a6040;color:#5de0a0;}
  /* Status */
  .ps-ok{background:#0a2010;color:#5de0a0;}
  .ps-pend{background:#2a0f0f;color:#ff8080;}
  .ps-part{background:#2a1a00;color:#ffc060;}
  /* Badges */
  .rec-badge{background:#3d1515;color:#ff8080;}
  .paid-badge{color:#5de0a0;}
  .unpaid-badge{color:#ffa020;}
  /* Spots */
  .s-ok{background:#0a2010;color:#5de0a0;}
  .s-warn{background:#2a1a00;color:#ffc060;}
  .s-full{background:#2a0f0f;color:#ff8080;}
  /* Cap chips */
  .cap-chip{background:#2a2a28;}
  .c-ok{color:#5de0a0;}
  .c-warn{color:#ffa020;}
  .c-full{color:#ff6060;}
  /* Tipo wraps */
  .tipo-wrap-t{background:rgba(100,160,255,0.12);}
  .tipo-wrap-m{background:rgba(200,130,255,0.12);}
  /* Canjear */
  .canjear-btn{border-color:#4a80d8;background:#0f2040;color:#7ab8ff;}
  /* Inputs */
  select option{background:#242422;color:#f0ede8;}
}
.tipo-wrap-t{background:var(--torno-bg);}
.tipo-wrap-m{background:var(--modelado-bg);}
.tipo-hdr{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;display:flex;align-items:center;gap:4px;}



.filt-bar{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;margin-bottom:10px;}
.filt-bar::-webkit-scrollbar{display:none;}
.fpill{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:20px;font-size:12px;font-weight:600;border:1.5px solid var(--border);background:var(--bg-card);color:var(--text2);cursor:pointer;white-space:nowrap;flex-shrink:0;}
.fpill.on{border-color:var(--text);background:var(--text);color:var(--bg);}
.fpill .fcount{font-size:10px;opacity:0.7;}


.ch-past{background:transparent;border-color:var(--border);color:var(--text3);opacity:0.45;}
.day-label-past{opacity:0.4;}
@media(prefers-color-scheme:dark){
  .ch-past{border-color:#333;color:#555;}
}


.fab-week{position:fixed;bottom:calc(70px + env(safe-area-inset-bottom,0px));left:50%;transform:translateX(-50%);z-index:49;background:var(--bg-card);border:1px solid var(--border);border-radius:20px;padding:8px 18px;font-size:13px;font-weight:600;color:var(--text);cursor:pointer;box-shadow:0 2px 12px rgba(0,0,0,.15);white-space:nowrap;transition:opacity .2s;}

.ch-recharge{background:#e8eaf6;color:#3d52a0;border-color:#9fa8da;}
.dot-recharge{background:#3d52a0;}
@media(prefers-color-scheme:dark){
  .ch-recharge{background:#1a1e3a;color:#9fa8da;border-color:#3d52a0;}
}
</style>
</head>
<body>
<div class="app">

// ─── DATE HELPERS ─────────────────────────────────────────────────────────────
function today(){return new Date().toISOString().slice(0,10);}
function fmtDS(s){return s?new Date(s+'T12:00:00').toLocaleDateString('es-ES',{day:'numeric',month:'short'}):'—';}
function fmtDL(s){return s?new Date(s+'T12:00:00').toLocaleDateString('es-ES',{day:'numeric',month:'short',year:'numeric'}):'—';}
function fmtDW(d){return d.toLocaleDateString('es-ES',{day:'numeric',month:'short'});}
function getMonday(d){var dt=new Date(d),day=dt.getDay();dt.setDate(dt.getDate()-(day===0?6:day-1));dt.setHours(12,0,0,0);return dt;}
function weekMon(off){var now=new Date();now.setDate(now.getDate()+off*7);var m=getMonday(now);return m.getFullYear()+'-'+String(m.getMonth()+1).padStart(2,'0')+'-'+String(m.getDate()).padStart(2,'0');}
function weekLbl(off){var m=getMonday(new Date(new Date().getTime()+off*7*864e5));var e=new Date(m);e.setDate(e.getDate()+5);return fmtDW(m)+' — '+fmtDW(e);}
function classDayDate(cid,monStr){
var c=CLS.find(function(x){return x.id===cid;});if(!c)return null;
var mon=new Date(monStr+'T12:00:00');
mon.setDate(mon.getDate()+(DAY_DOW[c.day]||1)-1);
return mon.toISOString().slice(0,10);
}
function classDateTime(cid,monStr){
// Returns 'YYYY-MM-DD HH:MM' for time-aware comparisons
var c=CLS.find(function(x){return x.id===cid;});if(!c)return null;
var d=classDayDate(cid,monStr);if(!d)return null;
return d+' '+c.start;
}
function sortN(a){return[].concat(a).sort(function(x,y){return x.name.localeCompare(y.name,'es');});}
function pauseOD(s){if(!s.pausaFin)return null;var d=Math.floor((new Date(today()+'T12:00:00')-new Date(s.pausaFin+'T12:00:00'))/864e5);return d>0?d:null;}
function clsName(id){var c=CLS.find(function(x){return x.id===id;});return c?c.day+' '+c.start:'';}
function remClasses(cid){
var now=new Date(),month=now.getMonth(),dm=DAY_DOW;
var c=CLS.find(function(x){return x.id===cid;});if(!c)return 0;
var tgt=dm[c.day],n=0,d=new Date(now);d.setHours(0,0,0,0);
while(d.getMonth()===month){if((d.getDay()===0?7:d.getDay())===tgt&&d>=now)n++;d.setDate(d.getDate()+1);}
return n;
}

// ─── STUDENT HELPERS ──────────────────────────────────────────────────────────
function isActive(s){
if(s.studentType==='gift'||s.status==='pausa'||s.status==='deleted'||s.studentType==='deleted')return false;
// flamateurs are always active if not deleted
var t=today();
if(s.joinDate&&s.joinDate>t)return false;
if(s.leaveDate&&s.leaveDate<=t)return false;
return s.status==='active';
}
function isActiveWeek(s,monStr){
if(s.studentType==='gift'||s.studentType==='flamateur'||s.studentType==='recharge'||s.status==='deleted'||s.studentType==='deleted')return false;
if(s.status==='pausa')return false;
if(s.joinDate){
var cd=s.classId?classDayDate(s.classId,monStr):null;
var cdt=s.classId?classDateTime(s.classId,monStr):null;
var joinCmp=s.joinDateTime||s.joinDate;
if(cdt&&joinCmp>cdt)return false;
if(!cdt&&cd&&s.joinDate>cd)return false;
if(!cd){
var sun=new Date(new Date(monStr+'T12:00:00').getTime()+6*864e5).toISOString().slice(0,10);
if(s.joinDate>sun)return false;
}
}
if(s.leaveDate){
var cd2=s.classId?classDayDate(s.classId,monStr):null;
if(cd2&&s.leaveDate<=cd2)return false;
if(!cd2&&s.leaveDate<=monStr)return false;
}
// scheduled pause: treat as paused from pausaInicio onwards
if(s.pausaScheduled&&s.pausaInicio){
var cd3=s.classId?classDayDate(s.classId,monStr):null;
if(cd3&&s.pausaInicio<=cd3)return false;
}
return true;
}
function suggestHandle(name){
var parts=name.trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9 ]/g,'').split(' ').filter(Boolean);
if(parts.length<2)return '';
var base=parts[0]+'.'+parts[1].slice(0,2),h=base,i=2;
while(sts.some(function(s){return s.handle===h;})){h=base+i;i++;}
return h;
}
function hExists(h,ex){return sts.some(function(s){return s.handle===h&&s.id!==ex;});}

if(s.classId===cid){
if(all.some(function(o){return(o.type==='baja'||o.type==='cambio')&&o.fromCid===cid;}))return false;
return true;
}
return false;
});
}
function getAllHere(cid,monStr){

if(s.studentType==='flamateur'){return getOvs(s.id,monStr).some(function(o){return o.type==='flamateur'&&o.toCid===cid;});}
if(s.studentType==='gift'){return getOvs(s.id,monStr).some(function(o){return o.type==='gift'&&o.toCid===cid;});}
if(s.studentType==='recharge'){return getOvs(s.id,monStr).some(function(o){return o.type==='recharge'&&o.toCid===cid;});}

var all=getOvs(s.id,monStr);
if(all.some(function(o){return(o.type==='recuperacion'||o.type==='gift')&&o.toCid===cid;}))return true;
if(all.some(function(o){return o.type==='cambio'&&o.toCid===cid;}))return true;
if(s.classId===cid){

if(s.joinDate&&cd&&s.joinDate>cd)return false;
if(s.leaveDate&&cd&&s.leaveDate<=cd)return false;
return true;
}
return false;
});
}

function fbSetField(val){return {stringValue: typeof val==='string'?val:JSON.stringify(val)};}

function migrateOvs(ovsArr){
  // One-time migration: all weeks were stored 1 day behind due to UTC bug
  // Only migrate if not already done (check flag in localStorage)
  if(localStorage.getItem('tc_migrated_v2')==='1')return ovsArr;
  var migrated=ovsArr.map(function(o){
    if(!o.week)return o;
    var parts=o.week.split('-');
    var d=new Date(+parts[0],+parts[1]-1,+parts[2]);
    d.setDate(d.getDate()+1);
    o=Object.assign({},o);
    o.week=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    return o;
  });
  localStorage.setItem('tc_migrated_v2','1');
  return migrated;
}

function loadFromFirebase(callback){
  var ind=document.getElementById('fb-loading');
  if(ind)ind.style.display='block';
  fetch(FB_URL+'?key='+FB_KEY)
    .then(function(r){
      if(r.status===404){
        if(ind)ind.style.display='none';
        if(callback)callback();
        return;
      }
      r.json().then(function(doc){
        if(ind)ind.style.display='none';
        if(doc&&doc.fields){
          try{
            var f=doc.fields;
            var fbSts=JSON.parse(f.sts?f.sts.stringValue:'[]');
            var fbPagos=JSON.parse(f.pagos?f.pagos.stringValue:'[]');
            var fbOvs=JSON.parse(f.ovs?f.ovs.stringValue:'[]');
            var fbInt=JSON.parse(f.interesados?f.interesados.stringValue:'[]');
            var fbNextId=f.nextId?+(f.nextId.integerValue||f.nextId.stringValue||100):100;
            if(fbSts.length>=sts.length){
              sts=fbSts;pagos=fbPagos;ovs=fbOvs;interesados=fbInt;nextId=fbNextId;
            // localStorage already saved above
              // localStorage already saved above
            }
          }catch(e){console.warn('FB parse:',e);}
        }
        if(callback)callback();
      });
    })
    .catch(function(e){
      console.warn('FB load:',e);
      if(ind)ind.style.display='none';
      if(callback)callback();
    });
}

(function(){
  try{
    var ss=localStorage.getItem('tc_s');
    var sp=localStorage.getItem('tc_p');
    var so=localStorage.getItem('tc_o');
    if(ss){sts=JSON.parse(ss);}

      return s;

  // Remove duplicate IDs - keep first occurrence
  var seenIds={};
  sts=sts.filter(function(s){
    if(seenIds[s.id])return false;
    seenIds[s.id]=true;return true;
  });
  // CRITICAL: update nextId to avoid duplicate IDs
  if(sts.length){
    var maxId=sts.reduce(function(m,s){return Math.max(m,+s.id||0);},0);
    if(maxId>=nextId)nextId=maxId+1;
  }
  // Save cleaned data
  try{localStorage.setItem('tc_s',JSON.stringify(sts));}catch(e){}
})();

var ovTo=all.find(function(o){return o.toCid===cid&&s.classId!==cid;});

var isGiftV=ovTo&&ovTo.type==='gift';

var isPend=s.joinDate&&(cdt2?joinCmp2>cdt2:cd&&s.joinDate>cd);
var isAboutToPause=s.pausaScheduled&&s.pausaInicio&&cd&&s.pausaInicio<=cd;

// (chips never ghosted - only day labels)

function flamCountMonth(sid){
  // Count flamateur overrides in the current calendar month
  var now=new Date();
  var m=now.getMonth(),y=now.getFullYear();
  return ovs.filter(function(o){
    if(o.sid!==sid||o.type!=='flamateur')return false;
    // week is a monday date string YYYY-MM-DD, check if it falls in current month
    var d=new Date(o.week+'T12:00:00');
    // Count the week if any day of that week is in the current month
    return d.getFullYear()===y&&d.getMonth()===m;
  }).length;
}

function daysSince(dateStr){
  if(!dateStr)return 0;
  return Math.floor((new Date()-new Date(dateStr+'T12:00:00'))/864e5);
}

});

var nPart=allReg.filter(function(s){var p=getPago(s.id,m,y);return p&&p.cantidad>0&&p.cantidad<s.cuota;}).length;

if(!isCurM)h+='<div style="text-align:center;margin-bottom:10px;"><button class="btn" style="font-size:12px;padding:5px 14px;" onclick="ui.curM=new Date().getMonth();ui.curY=new Date().getFullYear();render()">Volver a este mes</button></div>';

  +'<div class="sumblk"><div class="sumval" style="color:#1D9E75;">'+total+'€</div><div class="sumlbl">cobrado</div></div>'
  +'<div class="sumblk"><div class="sumval" style="color:#d63b3b;">'+nPend+'</div><div class="sumlbl">pendientes</div></div>'
  +'<div class="sumblk"><div class="sumval" style="color:#c07800;">'+nPart+'</div><div class="sumlbl">parciales</div></div>'
  +'</div>';
h+='<div style="position:relative;margin-bottom:14px;"><span style="position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:15px;color:var(--text2);">🔍</span>'
  +'<input type="text" id="pagos-search" placeholder="Buscar..." value="'+(ui.pagosQuery||'')+'" oninput="ui.pagosQuery=this.value;updatePagosList()" style="padding-left:38px;"></div>';
function chipPago(s){
  var p=getPago(s.id,m,y);
  var np=!p,pt=p&&p.cantidad>0&&p.cantidad<s.cuota;
  var bg,col,lbl;
  if(s.studentType==='recharge'){
    // Recharge: green if rechargeUnpaid<=0 (paid up or prepaid), red if owes classes
    var rcUnp=s.rechargeUnpaid||0;
    bg=rcUnp<=0?'#e1f5ee':'#ffeaea';
    col=rcUnp<=0?'#0a6e50':'#b03030';
    lbl=rcUnp<=0?(rcUnp<0?'+'+(Math.abs(rcUnp))+' adelantadas':'al día'):rcUnp+' por pagar';
  } else {
    // Regular and Flamateur: monthly payment, same logic
    bg=np?'#ffeaea':pt?'#fff3e0':'#e1f5ee';
    col=np?'#b03030':pt?'#8a5a00':'#0a6e50';
    lbl=np?s.cuota+'€':pt?p.cantidad+'/'+s.cuota+'€':p.cantidad+'€';
  }
  return '<span style="display:inline-flex;align-items:center;gap:4px;background:'+bg+';color:'+col
    +';border-radius:20px;padding:5px 10px;font-size:12px;font-weight:500;cursor:pointer;margin:3px;" onclick="openPM('+s.id+')">'
    +tIco(s.tipo)+' @'+s.handle+' <span style="font-weight:700;">'+lbl+'</span></span>';
}
var byClass={};
CLS.forEach(function(c){byClass[c.id]=[];});
reg.forEach(function(s){if(s.classId&&byClass[s.classId])byClass[s.classId].push(s);});
CLS.forEach(function(c){
  var list=sortN(byClass[c.id]);if(!list.length)return;
  var nPendCls=list.filter(function(s){return!getPago(s.id,m,y);}).length;
  var allOk=nPendCls===0;
  var badge=allOk
    ?'<span style="background:#1D9E75;color:#fff;border-radius:10px;font-size:10px;padding:1px 6px;margin-left:5px;">✓</span>'
    :'<span style="background:#d63b3b;color:#fff;border-radius:10px;font-size:10px;padding:1px 6px;margin-left:5px;">'+nPendCls+'</span>';
  h+='<div style="margin-bottom:16px;">'
    +'<div style="font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;display:flex;align-items:center;">'
    +c.day+' '+c.start+badge+'</div>'
    +'<div style="display:flex;flex-wrap:wrap;">';
  list.forEach(function(s){h+=chipPago(s);});
  h+='</div></div>';
});

// Flamateurs section
var flamList=sortN(reg.filter(function(s){return s.studentType==='flamateur';}));
if(flamList.length){
  h+='<div style="margin-bottom:16px;"><div style="font-size:11px;font-weight:700;color:#6b4c1e;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;">◈ Flamateurs</div><div style="display:flex;flex-wrap:wrap;">';
  flamList.forEach(function(s){h+=chipPago(s);});
  h+='</div></div>';
}
// Recharge section
var rcList=sortN(reg.filter(function(s){return s.studentType==='recharge';}));
if(rcList.length){
  var rcPend=rcList.filter(function(s){return(s.rechargeUnpaid||0)>0;}).length;
  var rcBadge=rcPend>0?'<span style="background:#d63b3b;color:#fff;border-radius:10px;font-size:10px;padding:1px 6px;margin-left:5px;">'+rcPend+'</span>':'<span style="background:#1D9E75;color:#fff;border-radius:10px;font-size:10px;padding:1px 6px;margin-left:5px;">✓</span>';
  h+='<div style="margin-bottom:16px;"><div style="font-size:11px;font-weight:700;color:#3d52a0;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;display:flex;align-items:center;">⚡ Recharge'+rcBadge+'</div><div style="display:flex;flex-wrap:wrap;">';
  rcList.forEach(function(s){h+=chipPago(s);});
  h+='</div></div>';
}
// Gift section: always show unpaid, only show paid in the month of payment
var giftList=sortN(reg.filter(function(s){
  if(s.studentType!=='gift'||!s.giftActivated)return false;
  var p=getPago(s.id,m,y);
  // Show if: no payment ever, OR payment exists in this specific month
  if(!p){
    // Check if paid in ANY other month - if yes, hide from current month
    var paidOther=pagos.some(function(pg){return pg.sid===s.id&&!(pg.mes===m&&pg.yr===y);});
    return !paidOther; // only show if never paid anywhere
  }
  return true; // show in the month where payment exists
}));
if(giftList.length){
  h+='<div style="margin-bottom:16px;"><div style="font-size:11px;font-weight:700;color:#7a1a9a;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;">🎁 Gift Card</div><div style="display:flex;flex-wrap:wrap;">';
  giftList.forEach(function(s){h+=chipPago(s);});
  h+='</div></div>';
}
return h;
}

function renderStatsModal(){
var sm=ui.statsM,sy=ui.statsY;
// Collect all months that have payments
var months=[];
var seen={};
pagos.forEach(function(p){var k=p.mes+'-'+p.yr;if(!seen[k]){seen[k]=true;months.push({m:p.mes,y:p.yr});}});
// Sort months desc
months.sort(function(a,b){return (b.yr*12+b.m)-(a.yr*12+a.m);});
// Stats for selected month
var reg=sts.filter(function(s){return (s.studentType==='regular'||s.studentType==='flamateur')&&s.status!=='deleted'&&(!s.joinDate||s.joinDate<=today());});
var mPagos=pagos.filter(function(p){return p.mes===sm&&p.yr===sy;});
var total=mPagos.reduce(function(a,p){return a+p.cantidad;},0);
var pagados=reg.filter(function(s){var p=getPago(s.id,sm,sy);return p&&p.cantidad>=s.cuota;}).length;
var parciales=reg.filter(function(s){var p=getPago(s.id,sm,sy);return p&&p.cantidad>0&&p.cantidad<s.cuota;}).length;
var pendientes=reg.filter(function(s){return!getPago(s.id,sm,sy);}).length;
var expected=reg.reduce(function(a,s){return a+s.cuota;},0);
var pct=expected>0?Math.round(total/expected*100):0;
// Monthly average across all months with data
var allTotals=[];
seen={};
pagos.forEach(function(p){var k=p.mes+'-'+p.yr;if(!seen[k])seen[k]=0;seen[k]+=p.cantidad;});
Object.values(seen).forEach(function(v){allTotals.push(v);});
var avg=allTotals.length>0?Math.round(allTotals.reduce(function(a,b){return a+b;},0)/allTotals.length):0;

var monthOpts=months.map(function(x){
return '<option value=”'+x.m+'-'+x.y+'”'+(x.m===sm&&x.y===sy?' selected':'')+'>'+MONTHS[x.m]+' '+x.y+'</option>';
}).join('');
// Also add current month if not present
var nowM=new Date().getMonth(),nowY=new Date().getFullYear();
if(!months.some(function(x){return x.m===nowM&&x.y===nowY;})){
monthOpts='<option value=”'+nowM+'-'+nowY+'”'+(nowM===sm&&nowY===sy?' selected':'')+'>'+MONTHS[nowM]+' '+nowY+' (actual)</option>'+monthOpts;
}

return '<div class="moverlay" onclick="ui.statsModal=false;renderM()">'
+'<div class="msheet" onclick="event.stopPropagation()">'
+'<div class="mhandle"></div>'
+'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">'
+'<div style="font-size:18px;font-weight:700;">📊 Estadísticas</div>'
+'<button onclick="ui.statsModal=false;renderM()" style="background:none;border:none;font-size:20px;cursor:pointer;color:var(--text2);">✕</button>'
+'</div>'
+'<select onchange="var p=this.value.split(\'-\');ui.statsM=parseInt(p[0]);ui.statsY=parseInt(p[1]);renderM()" style="margin-bottom:20px;">'+monthOpts+'</select>'
+'<div style="font-size:13px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:10px;">'+MONTHS[sm]+' '+sy+'</div>'
+'<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;">'
+'<div class="sumblk"><div class="sumval" style="color:#1D9E75;">'+total+'€</div><div class="sumlbl">Cobrado</div></div>'
+'<div class="sumblk"><div class="sumval" style="color:'+(pct>=100?'#1D9E75':pct>=70?'#c07800':'#d63b3b')+';">'+pct+'%</div><div class="sumlbl">Del esperado ('+expected+'€)</div></div>'
+'<div class="sumblk"><div class="sumval" style="color:#1D9E75;">'+pagados+'</div><div class="sumlbl">Pagados</div></div>'
+'<div class="sumblk"><div class="sumval" style="color:#c07800;">'+parciales+'</div><div class="sumlbl">Parciales</div></div>'
+'<div class="sumblk"><div class="sumval" style="color:#d63b3b;">'+pendientes+'</div><div class="sumlbl">Pendientes</div></div>'
+'<div class="sumblk"><div class="sumval">'+reg.length+'</div><div class="sumlbl">Alumnos activos</div></div>'
+'</div>'
+'<div style="height:1px;background:var(--border);margin-bottom:16px;"></div>'
+'<div style="font-size:13px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:10px;">Media histórica</div>'
+'<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">'
+'<div class="sumblk"><div class="sumval">'+avg+'€</div><div class="sumlbl">Media mensual</div></div>'
+'<div class="sumblk"><div class="sumval">'+allTotals.length+'</div><div class="sumlbl">Meses con datos</div></div>'
+'</div>'
+'</div></div>';
}

function editPago(sid,mes,yr){
  var p=pagos.find(function(x){return x.sid===sid&&x.mes===mes&&x.yr===yr;});
  if(!p)return;
  ui.pagoMod={sid:sid,cantidad:p.cantidad,nota:p.nota||''};
  ui.curM=mes;ui.curY=yr;
  renderM();
}
function deletePago(sid,mes,yr){
  var s=sts.find(function(x){return x.id==sid;});
  var sname=s?s.name:'alumno';
  if(!confirm('¿Eliminar pago de '+MONTHS[mes]+' '+yr+' de '+sname+'?'))return;
  var sn=snapData();
  // If recharge, restore rechargeUnpaid
  var p=pagos.find(function(x){return x.sid===sid&&x.mes===mes&&x.yr===yr;});
  if(s&&s.studentType==='recharge'&&p){
    var classesPaid=Math.round(p.cantidad/PPC);
    s.rechargeUnpaid=(s.rechargeUnpaid||0)+classesPaid;
  }
  pagos=pagos.filter(function(x){return!(x.sid===sid&&x.mes===mes&&x.yr===yr);});
  save();renderM();showU('Pago eliminado — '+sname,sn);
}

function renderCM(){
var cm=ui.cm,c=CLS.find(function(x){return x.id===cm.cid;});

if(cm.addMode){
  var ca=ui.cadd;
  function getAvail(type){
    if(type==='recuperacion')return sortN(sts.filter(function(s){return isActive(s)&&s.rec>0&&s.classId!==cm.cid&&!getOvs(s.id,cm.monStr).some(function(o){return(o.type==='recuperacion'||o.type==='gift')&&o.toCid===cm.cid;});}));
    if(type==='cambio')return sortN(sts.filter(function(s){return isActive(s)&&s.classId!==cm.cid&&!getOvs(s.id,cm.monStr).some(function(o){return o.toCid===cm.cid;});}));
    if(type==='gift')return sortN(sts.filter(function(s){return s.studentType==='gift'&&s.giftActivated&&s.giftClassesLeft>0;}));
    if(type==='flamateur')return sortN(sts.filter(function(s){return s.studentType==='flamateur'&&s.status!=='deleted'&&!getOvs(s.id,cm.monStr).some(function(o){return o.type==='flamateur'&&o.toCid===cm.cid;});}));
    if(type==='recharge')return sortN(sts.filter(function(s){return s.studentType==='recharge'&&s.status!=='deleted'&&!getOvs(s.id,cm.monStr).some(function(o){return o.type==='recharge'&&o.toCid===cm.cid;});}));
    return[];
  }
  var avail=getAvail(ca.type);
  var filtered=ca.query?avail.filter(function(s){return s.name.toLowerCase().includes(ca.query.toLowerCase())||s.handle.toLowerCase().includes(ca.query.toLowerCase());}):avail;
  var selS=ca.selId?sts.find(function(x){return x.id===ca.selId;}):null;

  var types=[['recuperacion','Recuperación'],['extra','Clase extra'],['cambio','Cambio de clase'],['gift','Gift card'],['flamateur','Flamateur'],['recharge','Recharge']];
  var typeBtns=types.map(function(t){
    return '<button class="tbtn'+(ca.type===t[0]?' sel':'')+'" onclick="setCaddType(&apos;'+t[0]+'&apos;)">'+t[1]+'</button>';
  }).join('');

  var flamTipoBtns='';
  if(ca.type==='flamateur'){
    flamTipoBtns='<div class="trow" style="margin-bottom:10px;">'
      +'<button class="tbtn'+(ca.flamTipo==='torno'?' sel':'')+'" onclick="setCaddFlamTipo(&apos;torno&apos;)">Torno</button>'
      +'<button class="tbtn'+(ca.flamTipo==='modelado'?' sel':'')+'" onclick="setCaddFlamTipo(&apos;modelado&apos;)">Modelado</button>'
      +'</div>';
  }
  if(ca.type==='recharge'){
    flamTipoBtns='<div class="trow" style="margin-bottom:10px;">'
      +'<button class="tbtn'+(ca.rechargeTipo==='torno'?' sel':'')+'" onclick="setCaddRechargeTipo(&apos;torno&apos;)">Torno</button>'
      +'<button class="tbtn'+(ca.rechargeTipo==='modelado'?' sel':'')+'" onclick="setCaddRechargeTipo(&apos;modelado&apos;)">Modelado</button>'
      +'</div>';
  }

  var listHtml=filtered.length?filtered.map(function(s){
    var meta='@'+s.handle+(s.rec>0&&ca.type==='recuperacion'?' · '+s.rec+' pendiente'+(s.rec>1?'s':''):ca.type==='gift'?' · '+s.giftClassesLeft+' clase'+(s.giftClassesLeft!==1?'s':''):'');
    return '<div class="slist-item'+(ca.selId===s.id?' sel':'')+'" onclick="ui.cadd.selId='+s.id+';updateCaddList()">'
      +'<span style="color:'+tCol(s.tipo)+'">'+tIco(s.tipo)+'</span>'
      +'<div><div class="sli-name">'+s.name+'</div><div class="sli-meta">'+meta+'</div></div></div>';
  }).join(''):'<div style="padding:16px;text-align:center;font-size:13px;color:var(--text3);">Sin resultados</div>';

  return '<div class="moverlay" onclick="closeCM()"><div class="msheet" onclick="event.stopPropagation()">'
    +'<div class="mhandle"></div><div class="mname" style="font-size:17px;">Añadir esta semana</div>'
    +'<div class="msub">'+c.day+' '+c.start+'</div>'
    +'<div class="trow" style="margin-bottom:12px;">'+typeBtns+'</div>'
    +flamTipoBtns
    +'<input type="text" id="cadd-search" placeholder="Buscar alumno..." value="'+ca.query+'" oninput="ui.cadd.query=this.value;updateCaddList()" style="margin-bottom:6px;">'
    +'<div class="slist" id="cadd-list">'+listHtml+'</div>'
    +'<div id="cadd-sel" style="margin-top:6px;padding:10px;background:var(--bg-subtle);border-radius:10px;font-size:13px;color:var(--text);">'+(selS?'Seleccionado: <b>'+selS.name+'</b> (@'+selS.handle+')':'')+'</div>'
    +'<div class="btn-row"><button class="btn" onclick="closeCM()">Cancelar</button><button class="btn btn-p" onclick="confirmAddToClass('+cm.cid+',&apos;'+cm.monStr+'&apos;)">Añadir</button></div>'
    +'</div></div>';
}

if(ui.csub==='move'){
  var s2=sts.find(function(x){return x.id===cm.sid;});if(!s2)return '';
  var items=CLS.filter(function(x){return x.id!==s2.classId;}).map(function(x){
    var att=getAttendees(x.id,cm.monStr);
    var ok3=(s2.tipo==='torno'?MAX_T-att.filter(function(a){return a.tipo==='torno';}).length:MAX_M-att.filter(function(a){return a.tipo==='modelado';}).length)>0;
    return '<div class="csi'+(ui.csel===x.id?' sel':'')+'" style="opacity:'+(ok3?1:0.55)+'" onclick="ui.csel='+x.id+';renderM()">'
      +'<div style="font-size:14px;font-weight:600;margin-bottom:4px;">'+x.day+' '+x.start+(ok3?'':' <span style="font-size:11px;color:#b03030;">(sin hueco)</span>')+'</div>'
      +clsSpots(x.id,cm.monStr)+'</div>';
  }).join('');
  return '<div class="moverlay" onclick="closeCM()"><div class="msheet" onclick="event.stopPropagation()">'
    +'<div class="mhandle"></div><div class="mname" style="font-size:17px;">Va a otra clase</div>'
    +'<div class="msub">'+s2.name+' · solo esta semana</div>'

    +'<div class="btn-row"><button class="btn" onclick="ui.csub=null;renderM()">Cancelar</button><button class="btn btn-p" onclick="doMoverSemana('+cm.sid+',\''+ cm.monStr +'\')">Confirmar</button></div>'

var allO=getOvs(s3.id,cm.monStr);
var ovFrom=allO.find(function(o){return o.fromCid===cm.cid;});
var ovTo=allO.find(function(o){return o.toCid===cm.cid&&s3.classId!==cm.cid;});
var isAbs=ovFrom&&ovFrom.type==='baja';
var isAbsM=ovFrom&&ovFrom.type==='cambio';
var isVisit=ovTo&&ovTo.type==='cambio';

var isRec2=ovTo&&ovTo.type==='recuperacion';
var isFlamV2=ovTo&&ovTo.type==='flamateur';
var isRechargeV2=ovTo&&ovTo.type==='recharge';
var isPausa2=s3.status==='pausa';

if(isPausa2)return '<div class="moverlay" onclick="closeCM()"><div class="msheet" onclick="event.stopPropagation()"><div class="mhandle"></div><div class="mname">'+tIco(s3.tipo)+' '+s3.name+'</div><div class="mhandle2">@'+s3.handle+'</div><div class="msub" style="color:#c07800;">En pausa'+(s3.pausaInicio?' desde '+fmtDS(s3.pausaInicio):'')+(s3.pausaFin?' hasta '+fmtDL(s3.pausaFin):'')+'</div></div></div>';
if(isPend2)return '<div class="moverlay" onclick="closeCM()"><div class="msheet" onclick="event.stopPropagation()"><div class="mhandle"></div><div class="mname">'+tIco(s3.tipo)+' '+s3.name+'</div><div class="mhandle2">@'+s3.handle+'</div><div class="msub" style="color:#0a6e50;">Se incorpora el '+fmtDL(s3.joinDate)+'</div></div></div>';

var rows='';
if(isRec2){
  rows+='<div class="arow" onclick="doCancelOv('+cm.sid+',\''+ cm.monStr +'\',false,'+cm.cid+')"><div class="aico" style="background:#e8f0fe;">✕</div><div><div class="atxt">Cancelar clase de recuperación</div><div class="asub">Devuelve 1 clase a pendientes</div></div></div>';
}
if(isFlamV2){
  var fCnt=flamCountMonth(cm.sid);
  rows+='<div class="abar ag" style="margin-bottom:8px;">Flamateur · '+fCnt+' clase'+(fCnt!==1?'s':'')+' este mes</div>';
  rows+='<div class="arow" onclick="doCancelOv('+cm.sid+',\''+ cm.monStr +'\',false,'+cm.cid+')"><div class="aico" style="background:#ffeaea;">✕</div><div><div class="atxt">Cancelar esta clase</div><div class="asub">Sin recuperación pendiente</div></div></div>';
}
var isExtraV2=ovTo&&ovTo.type==='extra';
if(isExtraV2){
  rows+='<div class="arow" onclick="doCancelOv('+cm.sid+',\''+ cm.monStr +'\',false,'+cm.cid+')"><div class="aico" style="background:#ffeaea;">✕</div><div><div class="atxt">Cancelar clase extra</div></div></div>';
}
if(isRechargeV2){
  var rcS=sts.find(function(x){return x.id===cm.sid;});
  var rcUnp=rcS?rcS.rechargeUnpaid||0:0;
  rows+='<div class="abar" style="margin-bottom:8px;background:#e8eaf6;color:#3d52a0;border-radius:10px;padding:8px 12px;font-size:13px;">Recharge · '+rcUnp+' clase'+(rcUnp!==1?'s':'')+' sin pagar</div>';
  rows+='<div class="arow" onclick="doCancelOv('+cm.sid+',\''+ cm.monStr +'\',false,'+cm.cid+')"><div class="aico" style="background:#ffeaea;">✕</div><div><div class="atxt">Cancelar esta clase</div><div class="asub">-1 clase del contador</div></div></div>';
}
if(isAbs||isAbsM||isVisit||isGift2){
  if(isVisit){
    var origCls=CLS.find(function(x){return x.id===s3.classId;});

// ── SWIPE NAVIGATION ──
(function(){
  var tx=0,ty=0,locked=null,dragging=false,dx=0,W=0,dir=0;
  var elC=null,elB=null,cloneC=null,cloneB=null,wrapper=null;

  function getContent(){return document.getElementById('content');}
  function getBar(){return document.getElementById('sticky-add-bar');}
  var EASE='cubic-bezier(0.25,0.46,0.45,0.94)';

  function buildClone(off){
    var savedOff=ui.weekOff;
    ui.weekOff=off;
    var cHtml='<div style="padding:16px">'+renderClases()+'</div>';
    var bHtml=renderWeekNav();
    ui.weekOff=savedOff;
    return {cHtml:cHtml,bHtml:bHtml};
  }

  document.addEventListener('touchstart',function(e){
    if(ui.tab!=='clases')return;
    if(e.touches.length!==1)return;
    tx=e.touches[0].clientX;
    ty=e.touches[0].clientY;
    locked=null;dragging=false;dx=0;dir=0;
    elC=getContent();elB=getBar();
    W=window.innerWidth;
  },{passive:true});

  document.addEventListener('touchmove',function(e){
    if(ui.tab!=='clases'||!elC)return;
    var cx=e.touches[0].clientX,cy=e.touches[0].clientY;
    var ddx=cx-tx,ddy=cy-ty;
    if(!locked){
      if(Math.abs(ddx)<5&&Math.abs(ddy)<5)return;
      locked=Math.abs(ddx)>=Math.abs(ddy)?'h':'v';
    }
    if(locked==='v')return;
    e.preventDefault();

    if(!dragging){
      dragging=true;
      dir=ddx<0?1:-1;
      var preloaded=buildClone(ui.weekOff+dir);

      // Measure incoming height to pre-size container
      var measDiv=document.createElement('div');
      measDiv.style.cssText='position:fixed;visibility:hidden;top:0;left:0;width:'+W+'px;padding:16px;box-sizing:border-box;';
      measDiv.innerHTML=preloaded.cHtml;
      document.body.appendChild(measDiv);
      var inH=measDiv.offsetHeight;
      document.body.removeChild(measDiv);
      var curH=elC.offsetHeight;
      var maxH=Math.max(curH,inH);

      // Pin current height to max so no jump
      elC.style.minHeight=maxH+'px';

      // Content clone
      cloneC=document.createElement('div');
      cloneC.style.cssText='position:fixed;top:'+elC.getBoundingClientRect().top+'px;left:0;width:'+W+'px;min-height:'+inH+'px;pointer-events:none;z-index:5;background:var(--bg);box-sizing:border-box;overflow:hidden;';
      cloneC.innerHTML=preloaded.cHtml;
      cloneC.style.transform='translateX('+(dir>0?W:-W)+'px)';
      document.body.appendChild(cloneC);

      // Bar clone
      if(elB){
        cloneB=document.createElement('div');
        cloneB.style.cssText='position:fixed;top:'+elB.getBoundingClientRect().top+'px;left:0;width:'+W+'px;height:'+elB.offsetHeight+'px;pointer-events:none;z-index:5;background:var(--bg);box-sizing:border-box;padding:8px 16px 0;';
        cloneB.innerHTML=preloaded.bHtml;
        cloneB.style.transform='translateX('+(dir>0?W:-W)+'px)';
        document.body.appendChild(cloneB);
        elB.style.willChange='transform';
      }
      elC.style.willChange='transform';
    }

    dx=ddx;
    elC.style.transform='translateX('+dx+'px)';
    if(cloneC)cloneC.style.transform='translateX('+(dx+(dir>0?W:-W))+'px)';
    if(elB)elB.style.transform='translateX('+dx+'px)';
    if(cloneB)cloneB.style.transform='translateX('+(dx+(dir>0?W:-W))+'px)';
  },{passive:false});

  document.addEventListener('touchend',function(){
    if(ui.tab!=='clases'||!dragging){dragging=false;locked=null;return;}
    var commit=Math.abs(dx)>W*0.28;
    var dur=commit?280:200;
    var easeStr='transform '+dur+'ms '+EASE;

    function cleanup(){
      [cloneC,cloneB].forEach(function(c){if(c&&c.parentNode)c.parentNode.removeChild(c);});
      cloneC=null;cloneB=null;
      [elC,elB].forEach(function(e){if(e){e.style.transition='';e.style.transform='';e.style.willChange='';e.style.minHeight='';}});
      dragging=false;locked=null;dx=0;
    }

    if(commit){
      if(elC){elC.style.transition=easeStr;elC.style.transform='translateX('+(-dir*W)+'px)';}
      if(elB){elB.style.transition=easeStr;elB.style.transform='translateX('+(-dir*W)+'px)';}
      if(cloneC){cloneC.style.transition=easeStr;cloneC.style.transform='translateX(0)';}
      if(cloneB){cloneB.style.transition=easeStr;cloneB.style.transform='translateX(0)';}
      setTimeout(function(){
        cleanup();
        var sy2=window.scrollY;ui.weekOff+=dir;render();window.scrollTo(0,sy2);
      },dur);
    } else {
      if(elC){elC.style.transition=easeStr;elC.style.transform='translateX(0)';}
      if(elB){elB.style.transition=easeStr;elB.style.transform='translateX(0)';}
      if(cloneC){cloneC.style.transition=easeStr;cloneC.style.transform='translateX('+(dir*W)+'px)';}
      if(cloneB){cloneB.style.transition=easeStr;cloneB.style.transform='translateX('+(dir*W)+'px)';}
      setTimeout(cleanup,dur);
    }
  },{passive:true});
})();
